<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVE Lawless Systems</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0f17;
            color: #e5e7eb;
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
        }

        select, button {
            padding: 6px 10px;
            margin-right: 10px;
            background: #111827;
            color: white;
            border: 1px solid #374151;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .card {
            background: #111827;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #1f2937;
        }

        .header {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .header img {
            width: 48px;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-top: 4px;
        }

        .lawless {
            color: #22c55e;
            font-weight: bold;
        }

        .meta {
            margin-bottom: 10px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

<h2>🔥 EVE Lawless Systems</h2>

<div class="controls">
    <select id="factionFilter">
        <option value="all">All factions</option>
        <option value="guristas">Guristas</option>
        <option value="angels">Angel Cartel</option>
    </select>

    <select id="secFilter">
        <option value="all">All space</option>
        <option value="High-Sec">High-Sec</option>
        <option value="Low-Sec">Low-Sec</option>
    </select>

    <button id="refreshBtn">Refresh</button>
</div>

<div class="meta" id="meta"></div>
<div id="app"></div>

<script>
    const API = "./data/insurgency.json";

    const HUBS = [
        { name: "Jita", id: 30000142 },
        { name: "Amarr", id: 30002187 },
        { name: "Dodixie", id: 30002659 },
        { name: "Hek", id: 30002053 },
        { name: "Rens", id: 30002510 },
    ];

    const FACTIONS = {
        500010: "guristas",
        500011: "angels"
    };

    const IMAGES = {
        guristas: "https://images.evetech.net/types/17918/render?size=64", // Rattlesnake
        angels: "https://images.evetech.net/types/17738/render?size=64"    // Machariel
    };

    let state = {
        systems: [],
        last: null,
        errors: []
    };

    const routeCache = new Map();

    async function fetchJson(url, opt = {}) {
        const r = await fetch(url, {
            cache: "no-store",
            headers: { "Accept": "application/json" },
            ...opt
        });

        const text = await r.text();

        if (!r.ok) {
            throw new Error(`HTTP ${r.status}: ${text.slice(0,200)}`);
        }

        return JSON.parse(text);
    }

    async function jumps(from, to) {
        const key = `${from}:${to}`;
        if (routeCache.has(key)) return routeCache.get(key);

        const url = `https://esi.evetech.net/route/${from}/${to}`;

        const route = await fetchJson(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-Compatibility-Date": "2025-09-30"
            },
            body: JSON.stringify({ preference: "shorter" })
        });

        if (!Array.isArray(route)) throw new Error("bad route");

        const j = Math.max(route.length - 1, 0);
        routeCache.set(key, j);
        return j;
    }

    async function hubInfo(systemId) {
        const res = await Promise.all(
            HUBS.map(async (h) => {
                try {
                    return { name: h.name, j: await jumps(systemId, h.id) };
                } catch (e) {
                    state.errors.push(`${systemId}->${h.name}`);
                    return { name: h.name, j: null };
                }
            })
        );

        const valid = res.filter(x => x.j !== null);
        const nearest = valid.length
            ? valid.reduce((a,b)=>a.j<b.j?a:b)
            : null;

        return { res, nearest };
    }

    async function load() {
        state.errors = [];

        const data = await fetchJson(API);

        let systems = [];

        for (const c of data) {
            const faction = FACTIONS[c.pirateFactionId];

            for (const i of c.insurgencies || []) {
                if ((i.corruptionState ?? 0) < 5) continue;

                systems.push({
                    id: i.solarSystem.id,
                    name: i.solarSystem.name,
                    sec: i.solarSystem.securityBand,
                    faction,
                    corr: i.corruptionPercentage
                });
            }
        }

        const enriched = await Promise.all(
            systems.map(async s => ({
                ...s,
                hubs: await hubInfo(s.id)
            }))
        );

        state.systems = enriched;
        state.last = new Date();
        render();
    }

    function render() {
        const faction = factionFilter.value;
        const sec = secFilter.value;

        let list = [...state.systems];

        if (faction !== "all") list = list.filter(x => x.faction === faction);
        if (sec !== "all") list = list.filter(x => x.sec === sec);

        meta.innerHTML = `
    Updated: ${state.last?.toLocaleTimeString() || "-"} |
    Systems: ${list.length}
    ${state.errors.length ? `<br style="color:red">Route errors: ${state.errors.length}` : ""}
  `;

        app.innerHTML = `
  <div class="grid">
    ${list.map(s => `
      <div class="card">
        <div class="header">
          <img src="${IMAGES[s.faction]}">
          <div>
            <div class="name">${s.name}</div>
            <div>${s.faction}</div>
          </div>
        </div>

        <div class="row"><div>Security</div><div>${s.sec}</div></div>
        <div class="row"><div>Corruption</div><div>${s.corr}%</div></div>

        <div class="row">
          <div>Nearest hub</div>
          <div>${s.hubs.nearest ? `${s.hubs.nearest.name} (${s.hubs.nearest.j})` : "ERR"}</div>
        </div>

        <div class="row">
          <div>All hubs</div>
          <div>${s.hubs.res.map(h => `${h.name}:${h.j ?? "?"}`).join("<br>")}</div>
        </div>

        <div class="row"><div>Lawless</div><div class="lawless">YES</div></div>
      </div>
    `).join("")}
  </div>`;
    }

    refreshBtn.onclick = load;
    factionFilter.onchange = render;
    secFilter.onchange = render;

    load();
    setInterval(load, 60000);
</script>

</body>
</html>
