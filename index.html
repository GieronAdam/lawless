<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EVE Lawless Systems</title>

    <style>
        :root {
            --bg: #0b0f17;
            --panel: #111827;
            --border: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --warn: #f59e0b;
            --err: #ef4444;
            --ok: #22c55e;

            --corruption-bar: #dc2626;
            --suppression-bar: #2563eb;
            --track: #1f2937;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        select, button {
            padding: 8px 10px;
            background: var(--panel);
            color: #fff;
            border: 1px solid #374151;
            border-radius: 8px;
        }

        button { cursor: pointer; }

        .meta {
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .faction-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .faction-column {
            position: relative;
            min-height: 200px;
            background: linear-gradient(180deg, rgba(17,24,39,0.92), rgba(15,23,42,0.96));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            overflow: hidden;
        }

        .faction-column::before {
            content: "";
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }

        .faction-column.angels::before {
            background-image: url("https://images.evetech.net/alliances/500011/logo?size=256");
        }

        .faction-column.guristas::before {
            background-image: url("https://images.evetech.net/alliances/500010/logo?size=256");
        }

        .faction-inner {
            position: relative;
            z-index: 1;
        }

        .faction-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .faction-header img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            padding: 4px;
        }

        .faction-title {
            font-size: 20px;
            font-weight: 700;
        }

        .faction-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .section-title {
            margin: 18px 0 10px;
            font-size: 15px;
            color: #cbd5e1;
        }

        .pill {
            display: inline-block;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 999px;
            background: #1f2937;
            color: #cbd5e1;
            margin-left: 8px;
        }

        .pill.fob {
            background: #7c2d12;
            color: #fed7aa;
        }

        .pill.lawless {
            background: #14532d;
            color: #bbf7d0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .card {
            background: rgba(17,24,39,0.86);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }

        .card-header {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            margin-top: 6px;
            align-items: flex-start;
        }

        .row > div:last-child {
            text-align: right;
        }

        .lawless {
            color: var(--ok);
            font-weight: bold;
        }

        .warn { color: var(--warn); }
        .err { color: var(--err); }
        .empty { color: var(--muted); font-size: 13px; padding: 8px 0; }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .progress-block {
            margin-top: 10px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 4px;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: var(--track);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
        }

        .progress-fill.corruption {
            background: linear-gradient(90deg, #991b1b, var(--corruption-bar));
        }

        .progress-fill.suppression {
            background: linear-gradient(90deg, #1d4ed8, var(--suppression-bar));
        }

        @media (max-width: 980px) {
            .faction-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<h1>🔥 EVE Lawless Systems</h1>

<div class="toolbar">
    <select id="secFilter">
        <option value="all">All space</option>
        <option value="High-Sec">High-Sec</option>
        <option value="Low-Sec">Low-Sec</option>
    </select>

    <select id="hubFilter">
        <option value="none">No hub filter</option>
        <option value="jita">Jita</option>
        <option value="amarr">Amarr</option>
        <option value="dodixie">Dodixie</option>
        <option value="hek">Hek</option>
        <option value="rens">Rens</option>
    </select>

    <select id="jumpFilter">
        <option value="5">Up to 5 jumps</option>
        <option value="10">Up to 10 jumps</option>
        <option value="15">Up to 15 jumps</option>
        <option value="9999">Any distance</option>
    </select>

    <button id="refreshBtn">Refresh</button>
</div>

<div class="meta" id="meta">Loading…</div>

<div class="faction-layout">
    <section class="faction-column angels">
        <div class="faction-inner">
            <div class="faction-header">
                <img src="https://images.evetech.net/alliances/500011/logo?size=128" alt="Angel Cartel">
                <div>
                    <div class="faction-title">Angel Cartel</div>
                    <div class="faction-sub">Lawless systems</div>
                </div>
            </div>
            <div id="angelsContent"></div>
        </div>
    </section>

    <section class="faction-column guristas">
        <div class="faction-inner">
            <div class="faction-header">
                <img src="https://images.evetech.net/alliances/500010/logo?size=128" alt="Guristas">
                <div>
                    <div class="faction-title">Guristas</div>
                    <div class="faction-sub">Lawless systems</div>
                </div>
            </div>
            <div id="guristasContent"></div>
        </div>
    </section>
</div>

<script>
    const API = "./data/lawless-systems.json";

    const IMAGES = {
        guristas: "https://images.evetech.net/types/17918/render?size=64",
        angels: "https://images.evetech.net/types/17738/render?size=64"
    };

    const FACTION_LABELS = {
        angels: "Angel Cartel",
        guristas: "Guristas"
    };

    let state = {
        systems: [],
        generatedAt: null,
        errors: [],
        showFar: {
            angels: false,
            guristas: false
        }
    };

    async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        const text = await response.text();

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${text.slice(0, 250)}`);
        }

        return JSON.parse(text);
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function clampPercent(value) {
        const n = Number(value ?? 0);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.min(100, n));
    }

    function createProgressBar(label, percentage, stateValue, cssClass) {
        const pct = clampPercent(percentage);
        const stateLabel = stateValue ?? "-";

        return `
    <div class="progress-block">
      <div class="progress-label">
        <span>${escapeHtml(label)}</span>
        <span>${pct.toFixed(2).replace(/\.00$/, "")}% • state ${escapeHtml(String(stateLabel))}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${cssClass}" style="width:${pct}%"></div>
      </div>
    </div>
  `;
    }

    function applyBaseFilters() {
        const sec = document.getElementById("secFilter").value;
        let list = [...state.systems];

        if (sec !== "all") {
            list = list.filter(x => x.sec === sec);
        }

        return list;
    }

    function createCard(system, selectedHubKey) {
        const distanceEntry = selectedHubKey !== "none"
            ? system.distances?.[selectedHubKey]
            : null;

        let distanceLabel = "-";
        let distanceClass = "";

        if (selectedHubKey !== "none") {
            if (!distanceEntry || distanceEntry.jumps === null) {
                distanceLabel = "ERR";
                distanceClass = "err";
            } else {
                distanceLabel = `${distanceEntry.jumps} jumps`;
            }
        }

        return `
    <div class="card">
      <div class="card-header">
        <img src="${IMAGES[system.faction] || ""}" alt="">
        <div>
          <div class="name">
            ${escapeHtml(system.name)}
            ${system.isFob ? `<span class="pill fob">FOB</span>` : ""}
            <span class="pill lawless">LAWLESS</span>
          </div>
          <div class="sub">${escapeHtml(FACTION_LABELS[system.faction] || system.faction)} • ${escapeHtml(system.sec)}</div>
        </div>
      </div>

      <div class="row">
        <div>System ID</div>
        <div>${system.id}</div>
      </div>

      <div class="row">
        <div>Campaign</div>
        <div>#${system.campaignId}</div>
      </div>

      <div class="row">
        <div>Lawless for</div>
        <div>${escapeHtml(system.lawlessAgeLabel || "-")}</div>
      </div>

      <div class="row">
        <div>Corruption date</div>
        <div>${system.corruptionDate ? escapeHtml(new Date(system.corruptionDate).toLocaleString()) : "-"}</div>
      </div>

      ${system.isFob ? `
        <div class="row">
          <div>FOB / origin</div>
          <div>${escapeHtml(system.fobOriginName || system.name)}</div>
        </div>
      ` : ""}

      ${
            selectedHubKey !== "none"
                ? `
            <div class="row">
              <div>${escapeHtml(distanceEntry?.hubName || selectedHubKey)}</div>
              <div class="${distanceClass}">${distanceLabel}</div>
            </div>
          `
                : ""
        }

      ${createProgressBar("Corruption", system.corruptionPercentage, system.corruptionState, "corruption")}
      ${createProgressBar("Suppression", system.suppressionPercentage, system.suppressionState, "suppression")}
    </div>
  `;
    }

    function renderFactionColumn(faction, items, hubKey, jumpLimit) {
        let inRange = [];
        let far = [];

        if (hubKey === "none") {
            inRange = items;
        } else {
            for (const item of items) {
                const distanceEntry = item.distances?.[hubKey];
                const jumps = distanceEntry?.jumps;

                if (typeof jumps === "number" && jumps <= jumpLimit) {
                    inRange.push(item);
                } else {
                    far.push(item);
                }
            }

            inRange.sort((a, b) => (a.distances[hubKey]?.jumps ?? 9999) - (b.distances[hubKey]?.jumps ?? 9999));
            far.sort((a, b) => (a.distances[hubKey]?.jumps ?? 9999) - (b.distances[hubKey]?.jumps ?? 9999));
        }

        const showFar = state.showFar[faction];

        const matchingHtml = `
    <div class="section-title">
      Matching systems
      <span class="pill">${inRange.length}${hubKey !== "none" ? ` within ${jumpLimit}j` : ""}</span>
    </div>
    ${
            inRange.length
                ? `<div class="grid">${inRange.map(x => createCard(x, hubKey)).join("")}</div>`
                : `<div class="empty">No systems match current filters yet.</div>`
        }
  `;

        if (hubKey === "none") {
            return matchingHtml;
        }

        const farHtml = showFar
            ? `
      <div class="section-title">Farther systems <span class="pill">${far.length}</span></div>
      ${
                far.length
                    ? `<div class="grid">${far.map(x => createCard(x, hubKey)).join("")}</div>`
                    : `<div class="empty">No farther systems.</div>`
            }
    `
            : `
      <div class="actions">
        <button class="show-far-btn" data-faction="${faction}">Load farther systems (${far.length})</button>
      </div>
    `;

        return matchingHtml + farHtml;
    }

    function render() {
        const meta = document.getElementById("meta");
        const angelsContent = document.getElementById("angelsContent");
        const guristasContent = document.getElementById("guristasContent");

        const hubKey = document.getElementById("hubFilter").value;
        const jumpLimit = Number(document.getElementById("jumpFilter").value);

        const baseList = applyBaseFilters();
        const angels = baseList.filter(x => x.faction === "angels");
        const guristas = baseList.filter(x => x.faction === "guristas");
        const fobCount = baseList.filter(x => x.isFob).length;

        const parts = [];
        parts.push(`Generated: ${state.generatedAt ? new Date(state.generatedAt).toLocaleString() : "-"}`);
        parts.push(`All visible systems: ${baseList.length}`);
        parts.push(`Angels: ${angels.length}`);
        parts.push(`Guristas: ${guristas.length}`);
        parts.push(`FOB-marked: ${fobCount}`);

        meta.innerHTML = parts.join(" | ");

        angelsContent.innerHTML = renderFactionColumn("angels", angels, hubKey, jumpLimit);
        guristasContent.innerHTML = renderFactionColumn("guristas", guristas, hubKey, jumpLimit);

        document.querySelectorAll(".show-far-btn").forEach(btn => {
            btn.onclick = () => {
                state.showFar[btn.dataset.faction] = true;
                render();
            };
        });
    }

    async function loadData() {
        state.showFar.angels = false;
        state.showFar.guristas = false;

        const data = await fetchJson(API);
        state.generatedAt = data.generatedAt;
        state.systems = data.systems || [];
        render();
    }

    document.getElementById("refreshBtn").onclick = loadData;
    document.getElementById("secFilter").onchange = loadData;
    document.getElementById("hubFilter").onchange = loadData;
    document.getElementById("jumpFilter").onchange = render;

    loadData();
    setInterval(loadData, 60000);
</script>

</body>
</html>
