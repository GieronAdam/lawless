<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EVE Lawless Systems</title>

    <style>
        :root {
            --bg: #070b12;
            --panel: #101722;
            --panel-2: #0d141f;
            --border: #1f2a39;
            --text: #e9eef7;
            --muted: #9aa8bc;
            --warn: #f59e0b;
            --err: #ef4444;
            --ok: #22c55e;

            --angel-primary: #ff7a18;
            --angel-secondary: #ffb347;
            --angel-glow: rgba(255, 122, 24, 0.22);

            --guristas-primary: #7c5cff;
            --guristas-secondary: #44d1ff;
            --guristas-glow: rgba(124, 92, 255, 0.20);

            --corruption-bar-1: #7a4a15;
            --corruption-bar-2: #b87020;
            --corruption-bar-3: #f0b24f;

            --suppression-bar-1: #1e4461;
            --suppression-bar-2: #2b6f95;
            --suppression-bar-3: #6bc6d9;

            --track-outer: #0b1119;
            --track-inner: #1a2432;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255,122,24,0.06), transparent 24%),
                radial-gradient(circle at top right, rgba(124,92,255,0.06), transparent 24%),
                var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 30px;
            letter-spacing: 0.3px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        select, button {
            padding: 9px 12px;
            background: linear-gradient(180deg, #131b28, #0d141f);
            color: #fff;
            border: 1px solid #334155;
            border-radius: 10px;
        }

        button {
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: #5b6b80;
        }

        .meta {
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .faction-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .faction-column {
            position: relative;
            min-height: 220px;
            border-radius: 18px;
            padding: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(16,23,34,0.95), rgba(10,16,25,0.98));
        }

        .faction-column::before {
            content: "";
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            background-position: center 58%;
            background-size: 62%;
            opacity: 0.065;
            pointer-events: none;
            z-index: 0;
        }

        .faction-column.angels {
            box-shadow:
                inset 0 0 0 1px rgba(255,122,24,0.12),
                0 0 32px rgba(255,122,24,0.06);
            background:
                radial-gradient(circle at top left, rgba(255,122,24,0.12), transparent 28%),
                linear-gradient(180deg, rgba(22,15,10,0.96), rgba(12,14,20,0.98));
        }

        .faction-column.guristas {
            box-shadow:
                inset 0 0 0 1px rgba(124,92,255,0.12),
                0 0 32px rgba(124,92,255,0.06);
            background:
                radial-gradient(circle at top right, rgba(124,92,255,0.12), transparent 28%),
                linear-gradient(180deg, rgba(13,15,28,0.96), rgba(10,13,20,0.98));
        }

        .faction-column.angels::before {
            background-image: url("https://images.evetech.net/factions/500011/logo?size=512");
        }

        .faction-column.guristas::before {
            background-image: url("https://images.evetech.net/factions/500010/logo?size=512");
        }

        .faction-inner {
            position: relative;
            z-index: 1;
        }

        .faction-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .faction-header img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            padding: 5px;
        }

        .angels .faction-header img {
            box-shadow: 0 0 18px var(--angel-glow);
        }

        .guristas .faction-header img {
            box-shadow: 0 0 18px var(--guristas-glow);
        }

        .faction-title {
            font-size: 21px;
            font-weight: 700;
        }

        .angels .faction-title {
            color: var(--angel-secondary);
        }

        .guristas .faction-title {
            color: var(--guristas-secondary);
        }

        .faction-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .section-title {
            margin: 18px 0 10px;
            font-size: 15px;
            color: #d7dfeb;
        }

        .pill {
            display: inline-block;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 999px;
            background: #1f2937;
            color: #cbd5e1;
            margin-left: 8px;
        }

        .pill.fob {
            background: #7c2d12;
            color: #fed7aa;
        }

        .pill.lawless {
            background: #14532d;
            color: #bbf7d0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .card {
            background: rgba(17,24,39,0.88);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 12px;
            min-width: 0;
            backdrop-filter: blur(2px);
        }

        .angels .card {
            box-shadow: inset 0 0 0 1px rgba(255,122,24,0.04);
        }

        .guristas .card {
            box-shadow: inset 0 0 0 1px rgba(124,92,255,0.05);
        }

        .card-header {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.2;
            word-break: break-word;
        }

        .sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            margin-top: 6px;
            align-items: flex-start;
        }

        .row > div:first-child {
            color: #c7d0dd;
        }

        .row > div:last-child {
            text-align: right;
            min-width: 0;
            word-break: break-word;
        }

        .lawless {
            color: var(--ok);
            font-weight: bold;
        }

        .warn { color: var(--warn); }
        .err { color: var(--err); }
        .empty {
            color: var(--muted);
            font-size: 13px;
            padding: 8px 0;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .progress-block {
            margin-top: 10px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
            color: #d5ddeb;
            margin-bottom: 5px;
        }

        .progress-track {
            position: relative;
            width: 100%;
            height: 12px;
            background:
                linear-gradient(180deg, var(--track-outer), #101722);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.04),
                inset 0 -1px 0 rgba(0,0,0,0.38);
        }

        .progress-track::after {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
            pointer-events: none;
        }

        .progress-fill {
            position: relative;
            height: 100%;
            width: 0%;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
            pointer-events: none;
        }

        .progress-fill.corruption {
            background:
                linear-gradient(90deg,
                var(--corruption-bar-1) 0%,
                var(--corruption-bar-2) 56%,
                var(--corruption-bar-3) 100%);
            box-shadow:
                0 0 10px rgba(240,178,79,0.18),
                inset 0 0 5px rgba(255,255,255,0.06);
        }

        .progress-fill.suppression {
            background:
                linear-gradient(90deg,
                var(--suppression-bar-1) 0%,
                var(--suppression-bar-2) 56%,
                var(--suppression-bar-3) 100%);
            box-shadow:
                0 0 10px rgba(107,198,217,0.16),
                inset 0 0 5px rgba(255,255,255,0.05);
        }

        @media (max-width: 1280px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 980px) {
            .faction-layout {
                grid-template-columns: 1fr;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<h1>🔥 EVE Lawless Systems</h1>

<div class="toolbar">
    <select id="secFilter">
        <option value="all">All space</option>
        <option value="High-Sec">High-Sec</option>
        <option value="Low-Sec">Low-Sec</option>
    </select>

    <select id="hubFilter">
        <option value="none">No hub filter</option>
        <option value="jita">Jita</option>
        <option value="amarr">Amarr</option>
        <option value="dodixie">Dodixie</option>
        <option value="hek">Hek</option>
        <option value="rens">Rens</option>
    </select>

    <select id="jumpFilter">
        <option value="5">Up to 5 jumps</option>
        <option value="10">Up to 10 jumps</option>
        <option value="15">Up to 15 jumps</option>
        <option value="9999">Any distance</option>
    </select>

    <button id="refreshBtn">Refresh</button>
</div>

<div class="meta" id="meta">Loading…</div>

<div class="faction-layout">
    <section class="faction-column angels">
        <div class="faction-inner">
            <div class="faction-header">
                <img src="https://images.evetech.net/factions/500011/logo?size=128" alt="Angel Cartel">
                <div>
                    <div class="faction-title">Angel Cartel</div>
                    <div class="faction-sub">Lawless systems</div>
                </div>
            </div>
            <div id="angelsContent"></div>
        </div>
    </section>

    <section class="faction-column guristas">
        <div class="faction-inner">
            <div class="faction-header">
                <img src="https://images.evetech.net/factions/500010/logo?size=128" alt="Guristas">
                <div>
                    <div class="faction-title">Guristas</div>
                    <div class="faction-sub">Lawless systems</div>
                </div>
            </div>
            <div id="guristasContent"></div>
        </div>
    </section>
</div>

<script>
    const API = "./data/lawless-systems.json";

    const IMAGES = {
        guristas: "https://images.evetech.net/types/17918/render?size=64",
        angels: "https://images.evetech.net/types/17738/render?size=64"
    };

    const FACTION_LABELS = {
        angels: "Angel Cartel",
        guristas: "Guristas"
    };

    const HUB_LABELS = {
        jita: "Jita",
        amarr: "Amarr",
        dodixie: "Dodixie",
        hek: "Hek",
        rens: "Rens"
    };

    let state = {
        systems: [],
        generatedAt: null,
        errors: [],
        showFar: {
            angels: false,
            guristas: false
        }
    };

    async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        const text = await response.text();

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${text.slice(0, 250)}`);
        }

        return JSON.parse(text);
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function clampPercent(value) {
        const n = Number(value ?? 0);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.min(100, n));
    }

    function createProgressBar(label, percentage, stateValue, cssClass) {
        const pct = clampPercent(percentage);
        const stateLabel = stateValue ?? "-";

        return `
            <div class="progress-block">
              <div class="progress-label">
                <span>${escapeHtml(label)}</span>
                <span>${pct.toFixed(2).replace(/\.00$/, "")}% • state ${escapeHtml(String(stateLabel))}</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill ${cssClass}" style="width:${pct}%"></div>
              </div>
            </div>
        `;
    }

    function applyBaseFilters() {
        const sec = document.getElementById("secFilter").value;
        let list = [...state.systems];

        if (sec !== "all") {
            list = list.filter(x => x.sec === sec);
        }

        return list;
    }

    function createCard(system, selectedHubKey) {
        const distanceEntry = selectedHubKey !== "none"
            ? system.distances?.[selectedHubKey]
            : null;

        let distanceLabel = "-";
        let distanceClass = "";

        if (selectedHubKey !== "none") {
            if (!distanceEntry) {
                distanceLabel = "NO DATA";
                distanceClass = "err";
            } else if (distanceEntry.jumps === null) {
                distanceLabel = "ERR";
                distanceClass = "err";
            } else {
                distanceLabel = `${distanceEntry.jumps} jumps`;
            }
        }

        return `
            <div class="card">
              <div class="card-header">
                <img src="${IMAGES[system.faction] || ""}" alt="">
                <div>
                  <div class="name">
                    ${escapeHtml(system.name)}
                    ${system.isFob ? `<span class="pill fob">FOB</span>` : ""}
                    <span class="pill lawless">LAWLESS</span>
                  </div>
                  <div class="sub">${escapeHtml(FACTION_LABELS[system.faction] || system.faction)} • ${escapeHtml(system.sec)}</div>
                </div>
              </div>

              <div class="row">
                <div>System ID</div>
                <div>${system.id}</div>
              </div>

              <div class="row">
                <div>Campaign</div>
                <div>#${system.campaignId}</div>
              </div>

              <div class="row">
                <div>Lawless for</div>
                <div>${escapeHtml(system.lawlessAgeLabel || "-")}</div>
              </div>

              <div class="row">
                <div>Corruption date</div>
                <div>${system.corruptionDate ? escapeHtml(new Date(system.corruptionDate).toLocaleString()) : "-"}</div>
              </div>

              ${system.isFob ? `
                <div class="row">
                  <div>FOB / origin</div>
                  <div>${escapeHtml(system.fobOriginName || system.name)}</div>
                </div>
              ` : ""}

              ${
            selectedHubKey !== "none"
                ? `
                    <div class="row">
                      <div>${escapeHtml(distanceEntry?.hubName || HUB_LABELS[selectedHubKey] || selectedHubKey)}</div>
                      <div class="${distanceClass}">${distanceLabel}</div>
                    </div>
                  `
                : ""
        }

              ${createProgressBar("Corruption", system.corruptionPercentage, system.corruptionState, "corruption")}
              ${createProgressBar("Suppression", system.suppressionPercentage, system.suppressionState, "suppression")}
            </div>
        `;
    }

    function renderFactionColumn(faction, items, hubKey, jumpLimit) {
        let inRange = [];
        let far = [];

        if (hubKey === "none") {
            inRange = items;
        } else {
            for (const item of items) {
                const distanceEntry = item.distances?.[hubKey];
                const jumps = distanceEntry?.jumps;

                if (typeof jumps === "number" && jumps <= jumpLimit) {
                    inRange.push(item);
                } else {
                    far.push(item);
                }
            }

            inRange.sort((a, b) => (a.distances?.[hubKey]?.jumps ?? 9999) - (b.distances?.[hubKey]?.jumps ?? 9999));
            far.sort((a, b) => (a.distances?.[hubKey]?.jumps ?? 9999) - (b.distances?.[hubKey]?.jumps ?? 9999));
        }

        const showFar = state.showFar[faction];

        const matchingHtml = `
            <div class="section-title">
              Matching systems
              <span class="pill">${inRange.length}${hubKey !== "none" ? ` within ${jumpLimit}j` : ""}</span>
            </div>
            ${
            inRange.length
                ? `<div class="grid">${inRange.map(x => createCard(x, hubKey)).join("")}</div>`
                : `<div class="empty">No systems match current filters yet.</div>`
        }
        `;

        if (hubKey === "none") {
            return matchingHtml;
        }

        const farHtml = showFar
            ? `
              <div class="section-title">Farther systems <span class="pill">${far.length}</span></div>
              ${
                far.length
                    ? `<div class="grid">${far.map(x => createCard(x, hubKey)).join("")}</div>`
                    : `<div class="empty">No farther systems.</div>`
            }
            `
            : `
              <div class="actions">
                <button class="show-far-btn" data-faction="${faction}">Load farther systems (${far.length})</button>
              </div>
            `;

        return matchingHtml + farHtml;
    }

    function render() {
        const meta = document.getElementById("meta");
        const angelsContent = document.getElementById("angelsContent");
        const guristasContent = document.getElementById("guristasContent");

        const hubKey = document.getElementById("hubFilter").value;
        const jumpLimit = Number(document.getElementById("jumpFilter").value);

        const baseList = applyBaseFilters();
        const angels = baseList.filter(x => x.faction === "angels");
        const guristas = baseList.filter(x => x.faction === "guristas");
        const fobCount = baseList.filter(x => x.isFob).length;

        const stats = state.stats || {};

        const parts = [];
        parts.push(`Generated: ${state.generatedAt ? new Date(state.generatedAt).toLocaleString() : "-"}`);
        parts.push(`All visible systems: ${baseList.length}`);
        parts.push(`Angels: ${angels.length}`);
        parts.push(`Guristas: ${guristas.length}`);
        parts.push(`FOB-marked: ${fobCount}`);
        if (typeof stats.cachedDistancesReused === "number") parts.push(`Cache hits: ${stats.cachedDistancesReused}`);
        if (typeof stats.routeCalculatedNow === "number") parts.push(`Routes now: ${stats.routeCalculatedNow}`);
        if (typeof stats.routeErrors === "number") parts.push(`Route errors: ${stats.routeErrors}`);

        meta.innerHTML = parts.join(" | ");

        angelsContent.innerHTML = renderFactionColumn("angels", angels, hubKey, jumpLimit);
        guristasContent.innerHTML = renderFactionColumn("guristas", guristas, hubKey, jumpLimit);

        document.querySelectorAll(".show-far-btn").forEach(btn => {
            btn.onclick = () => {
                state.showFar[btn.dataset.faction] = true;
                render();
            };
        });
    }

    async function loadData() {
        state.showFar.angels = false;
        state.showFar.guristas = false;

        const data = await fetchJson(API);

        state.generatedAt = data.generatedAt;
        state.stats = data.stats || {};
        state.systems = data.systems || [];
        render();
    }

    document.getElementById("refreshBtn").onclick = loadData;
    document.getElementById("secFilter").onchange = loadData;
    document.getElementById("hubFilter").onchange = loadData;
    document.getElementById("jumpFilter").onchange = render;

    loadData();
    setInterval(loadData, 60000);
</script>

</body>
</html>
