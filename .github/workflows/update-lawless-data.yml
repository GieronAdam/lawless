name: Update lawless systems data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-lawless-data.yml"

permissions:
  contents: write

concurrency:
  group: update-lawless-systems-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Debug time
        run: date -u

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build enriched lawless JSON
        run: |
          mkdir -p data scripts

          cat > scripts/build-lawless.mjs <<'EOF'
          import fs from "node:fs/promises";

          const INSURGENCY_URL = "https://www.eveonline.com/api/warzone/insurgency";
          const ROUTE_BASE = "https://esi.evetech.net/route";
          const OUTPUT_PATH = "data/lawless-systems.json";

          const HUBS = [
            { key: "jita", name: "Jita", id: 30000142 },
            { key: "amarr", name: "Amarr", id: 30002187 },
            { key: "dodixie", name: "Dodixie", id: 30002659 },
            { key: "hek", name: "Hek", id: 30002053 },
            { key: "rens", name: "Rens", id: 30002510 }
          ];

          const FACTIONS = {
            500010: "guristas",
            500011: "angels"
          };

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function fetchJson(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                Accept: "application/json",
                ...(options.headers || {})
              }
            });

            const text = await response.text();

            if (!response.ok) {
              throw new Error(`HTTP ${response.status} for ${url}: ${text.slice(0, 500)}`);
            }

            try {
              return JSON.parse(text);
            } catch {
              throw new Error(`Invalid JSON from ${url}: ${text.slice(0, 500)}`);
            }
          }

          async function readPreviousOutput() {
            try {
              const raw = await fs.readFile(OUTPUT_PATH, "utf8");
              return JSON.parse(raw);
            } catch {
              return null;
            }
          }

          function buildDistanceCache(previousOutput) {
            const cache = new Map();

            if (!previousOutput?.systems || !Array.isArray(previousOutput.systems)) {
              return cache;
            }

            for (const system of previousOutput.systems) {
              const systemId = system?.id;
              const distances = system?.distances;

              if (!systemId || !distances || typeof distances !== "object") {
                continue;
              }

              for (const [hubKey, entry] of Object.entries(distances)) {
                if (entry && typeof entry === "object" && typeof entry.jumps === "number") {
                  cache.set(`${systemId}:${hubKey}`, entry);
                }
              }
            }

            return cache;
          }

          async function getRouteJumps(fromSystemId, toSystemId, retries = 4) {
            const url = `${ROUTE_BASE}/${fromSystemId}/${toSystemId}`;

            for (let attempt = 1; attempt <= retries; attempt++) {
              try {
                const payload = await fetchJson(url, {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "X-Compatibility-Date": "2025-09-30",
                    "User-Agent": "github-actions-lawless-tool"
                  },
                  body: JSON.stringify({
                    preference: "Shorter",
                    security_penalty: 50
                  })
                });

                let route = null;

                if (Array.isArray(payload)) {
                  route = payload;
                } else if (payload && Array.isArray(payload.route)) {
                  route = payload.route;
                }

                if (!Array.isArray(route)) {
                  throw new Error(
                    `Unexpected route payload: ${JSON.stringify(payload).slice(0, 300)}`
                  );
                }

                return Math.max(route.length - 1, 0);
              } catch (error) {
                if (attempt === retries) {
                  throw error;
                }
                await sleep(1200 * attempt);
              }
            }
          }

          async function runWithConcurrency(items, limit, worker) {
            let index = 0;

            async function next() {
              while (index < items.length) {
                const currentIndex = index++;
                await worker(items[currentIndex], currentIndex);
              }
            }

            await Promise.all(
              Array.from({ length: Math.min(limit, items.length) }, () => next())
            );
          }

          function getLawlessAge(corruptionDate) {
            if (!corruptionDate) return { days: null, label: "-" };

            const start = new Date(corruptionDate).getTime();
            if (Number.isNaN(start)) return { days: null, label: "-" };

            const diffMs = Date.now() - start;
            if (diffMs < 0) return { days: 0, label: "0h" };

            const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
            const days = Math.floor(totalHours / 24);
            const hours = totalHours % 24;

            return {
              days,
              label: days === 0 ? `${hours}h` : `${days}d ${hours}h`
            };
          }

          function dedupeSystems(systems) {
            const byId = new Map();

            for (const system of systems) {
              const existing = byId.get(system.id);

              if (!existing) {
                byId.set(system.id, system);
                continue;
              }

              const existingCorr = Number(existing.corruptionPercentage ?? 0);
              const currentCorr = Number(system.corruptionPercentage ?? 0);

              if (currentCorr > existingCorr) {
                byId.set(system.id, system);
              }
            }

            return [...byId.values()];
          }

          async function main() {
            const previousOutput = await readPreviousOutput();
            const previousDistanceCache = buildDistanceCache(previousOutput);

            const campaigns = await fetchJson(INSURGENCY_URL);
            const rawSystems = [];

            for (const campaign of campaigns) {
              const faction = FACTIONS[campaign.pirateFactionId] ?? "unknown";
              const fobOriginId = campaign.originSolarSystem?.id ?? null;
              const fobOriginName = campaign.originSolarSystem?.name ?? null;

              for (const entry of campaign.insurgencies || []) {
                if ((entry.corruptionState ?? 0) < 5) continue;

                const systemId = entry.solarSystem?.id;
                if (!systemId) continue;

                const lawlessAge = getLawlessAge(entry.corruptionDate);

                const distances = {};
                for (const hub of HUBS) {
                  const cached = previousDistanceCache.get(`${systemId}:${hub.key}`);
                  if (cached) {
                    distances[hub.key] = cached;
                  }
                }

                rawSystems.push({
                  id: systemId,
                  name: entry.solarSystem.name,
                  sec: entry.solarSystem.securityBand,
                  security: entry.solarSystem.security,
                  faction,
                  campaignId: campaign.campaignId,
                  campaignState: campaign.state,
                  isFob: fobOriginId !== null && systemId === fobOriginId,
                  fobOriginId,
                  fobOriginName,
                  corruptionPercentage: entry.corruptionPercentage,
                  corruptionState: entry.corruptionState,
                  corruptionDate: entry.corruptionDate,
                  suppressionPercentage: entry.suppressionPercentage,
                  suppressionState: entry.suppressionState,
                  suppressionDate: entry.suppressionDate,
                  lawlessAgeDays: lawlessAge.days,
                  lawlessAgeLabel: lawlessAge.label,
                  distances,
                  routeErrors: {}
                });
              }
            }

            const systems = dedupeSystems(rawSystems);

            const jobs = [];
            for (const system of systems) {
              for (const hub of HUBS) {
                if (!system.distances[hub.key] || typeof system.distances[hub.key].jumps !== "number") {
                  jobs.push({ system, hub });
                }
              }
            }

            let okCount = 0;
            let errCount = 0;
            let cacheHitCount = 0;

            for (const system of systems) {
              for (const hub of HUBS) {
                if (system.distances[hub.key] && typeof system.distances[hub.key].jumps === "number") {
                  cacheHitCount++;
                }
              }
            }

            console.log(`Systems: ${systems.length}`);
            console.log(`Cached distances reused: ${cacheHitCount}`);
            console.log(`Route jobs to calculate: ${jobs.length}`);

            await runWithConcurrency(jobs, 5, async ({ system, hub }) => {
              try {
                const jumps = await getRouteJumps(system.id, hub.id, 4);
                system.distances[hub.key] = {
                  hubId: hub.id,
                  hubName: hub.name,
                  jumps
                };
                okCount++;
              } catch (error) {
                system.distances[hub.key] = {
                  hubId: hub.id,
                  hubName: hub.name,
                  jumps: null
                };
                system.routeErrors[hub.key] = String(
                  error instanceof Error ? error.message : error
                );
                errCount++;
              }
            });

            for (const system of systems) {
              const validDistances = Object.values(system.distances)
                .filter((entry) => entry && typeof entry.jumps === "number");

              if (validDistances.length) {
                system.nearestHub = validDistances.reduce((best, cur) =>
                  cur.jumps < best.jumps ? cur : best
                );
              } else {
                system.nearestHub = null;
              }
            }

            systems.sort((a, b) => {
              if (a.faction !== b.faction) return a.faction.localeCompare(b.faction);
              return a.name.localeCompare(b.name);
            });

            const output = {
              generatedAt: new Date().toISOString(),
              source: INSURGENCY_URL,
              hubs: HUBS,
              stats: {
                systems: systems.length,
                cachedDistancesReused: cacheHitCount,
                routeCalculatedNow: okCount,
                routeErrors: errCount
              },
              systems
            };

            const tmpPath = `${OUTPUT_PATH}.tmp`;
            await fs.writeFile(
              tmpPath,
              JSON.stringify(output, null, 2),
              "utf8"
            );
            await fs.rename(tmpPath, OUTPUT_PATH);

            console.log(`Route calculated now: ${okCount}`);
            console.log(`Route errors: ${errCount}`);
            console.log(`Wrote ${OUTPUT_PATH}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

          node scripts/build-lawless.mjs

      - name: Commit generated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lawless-systems.json

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "Update lawless systems data"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebase on latest main
        if: steps.commit.outputs.changed == 'true'
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Push changes with retry
        if: steps.commit.outputs.changed == 'true'
        run: |
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed on attempt $i, retrying after rebase..."
            git fetch origin main
            git pull --rebase origin main
            sleep 3
          done
          echo "Push failed after retries"
          exit 1