name: Update insurgency data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-insurgency.yml"

permissions:
  contents: write

concurrency:
  group: update-insurgency-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Debug time
        run: date -u

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data dir
        run: mkdir -p data

      - name: Fetch insurgency data
        run: curl -fsSL "https://www.eveonline.com/api/warzone/insurgency" -o data/insurgency.json

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/insurgency.json

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "Update insurgency data"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: git push