name: Update insurgency data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-insurgency.yml"

permissions:
  contents: write

concurrency:
  group: update-insurgency-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Debug time
        run: date -u

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create data dir
        run: mkdir -p data

      - name: Fetch insurgency data safely
        run: |
          curl -fsSL "https://www.eveonline.com/api/warzone/insurgency" -o data/insurgency.json.tmp
          mv data/insurgency.json.tmp data/insurgency.json

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/insurgency.json

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "Update insurgency data"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebase on latest main
        if: steps.commit.outputs.changed == 'true'
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Push changes with retry
        if: steps.commit.outputs.changed == 'true'
        run: |
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed on attempt $i, retrying after rebase..."
            git fetch origin main
            git pull --rebase origin main
            sleep 3
          done
          echo "Push failed after retries"
          exit 1