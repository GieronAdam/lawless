name: Update insurgency data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create data dir
        run: mkdir -p data

      - name: Fetch insurgency data
        run: curl -sS "https://www.eveonline.com/api/warzone/insurgency" -o data/insurgency.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/insurgency.json
          git diff --staged --quiet || git commit -m "Update insurgency data"
          git push